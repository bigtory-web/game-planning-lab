<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>game-planning-lab</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --line: #24324d;
      --text: #ecf2ff;
      --muted: #a8b4cf;
      --accent: #7fb0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #08111f 0%, #0d1627 100%);
      color: var(--text);
    }
    .wrap {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
      padding: 52px 0 72px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 6vw, 3.4rem);
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .panel {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(17, 26, 43, 0.92);
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }
    ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
    }
    code {
      color: var(--text);
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>game-planning-lab</h1>
    <p>공용 작업 규칙, 프롬프트, 템플릿, 가이드를 관리하는 허브 저장소입니다.</p>

    <section class="panel">
      <h2>현재 역할</h2>
      <ul>
        <li><code>CLAUDE.md</code> 기반 작업 규칙 관리</li>
        <li>공용 프롬프트와 템플릿 보관</li>
        <li>가이드와 변경 이력 유지</li>
      </ul>
    </section>

    <section class="panel">
      <h2>프로젝트 작업 방식</h2>
      <ul>
        <li>실제 프로토타입과 문서는 프로젝트별 독립 저장소에서 관리</li>
        <li>이 저장소는 공용 기준과 재사용 자산만 유지</li>
      </ul>
    </section>
  </main>
</body>
</html>
